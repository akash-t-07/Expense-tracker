<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>
    <p class="subtitle">Simple full-stack expense tracker</p>

    <section class="card">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <div class="grid">
          <div>
            <label for="amount">Amount</label>
            <input type="number" id="amount" step="0.01" min="0.01" required />
          </div>
          <div>
            <label for="category">Category</label>
            <input type="text" id="category" required />
          </div>
          <div>
            <label for="description">Description</label>
            <input type="text" id="description" required />
          </div>
          <div>
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>
        <button type="submit" id="submit-btn">Add Expense</button>
        <p id="message"></p>
      </form>
    </section>

    <section class="card">
      <div class="filters">
        <div>
          <label for="filter-category">Filter Category</label>
          <select id="filter-category">
            <option value="">All</option>
          </select>
        </div>
        <div>
          <label for="sort-order">Sort</label>
          <select id="sort-order">
            <option value="date_desc">Date Desc</option>
          </select>
        </div>
      </div>

      <h3>Total: <span id="total">₹0.00</span></h3>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="expense-body">
          <tr><td colspan="4">No expenses yet</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
